<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>取引先管理 | 光熱費まるごと比較ナビ</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans',sans-serif;
  background:#F3F4F6;color:#1F2937;line-height:1.6;
  padding:24px 16px 60px;
}
.wrap{max-width:920px;margin:0 auto}

header{margin-bottom:24px}
h1{font-size:22px;color:#1A5EA8;font-weight:800}
.sub{font-size:12px;color:#6B7280;margin-top:4px}

.card{
  background:#fff;border-radius:14px;padding:20px 22px;
  margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.06);
}
.card-ttl{font-size:15px;font-weight:800;color:#111827;margin-bottom:14px}

#noAccess{display:none;text-align:center;padding:60px 20px}
#noAccess .icon{font-size:40px;margin-bottom:12px}
#loadingBox{text-align:center;padding:60px 20px;color:#9CA3AF;font-size:13px}

.frow{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:640px){.frow{grid-template-columns:1fr}}
.fld label{display:block;font-size:12.5px;font-weight:700;color:#374151;margin-bottom:5px}
.fld input,.fld select{
  width:100%;padding:9px 11px;border:1.5px solid #D1D5DB;border-radius:8px;
  font-size:14px;font-family:inherit;
}
.fld input:focus,.fld select:focus{outline:none;border-color:#1A5EA8}
.fld .hint{font-size:11px;color:#9CA3AF;margin-top:3px}

.chk-group{display:flex;flex-wrap:wrap;gap:10px;margin-top:6px}
.chk-item{
  display:flex;align-items:center;gap:6px;background:#F9FAFB;
  border:1.5px solid #E5E7EB;border-radius:8px;padding:7px 12px;
  font-size:13px;cursor:pointer;
}
.chk-item input{width:auto;margin:0}

.btn-primary{
  background:#1A5EA8;color:#fff;border:none;border-radius:9px;
  padding:11px 22px;font-size:14px;font-weight:800;cursor:pointer;
  font-family:inherit;
}
.btn-primary:hover{opacity:.9}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}

.msg{font-size:13px;margin-top:10px;padding:9px 12px;border-radius:8px;display:none}
.msg.ok{background:#F0FDF4;color:#15803D;border:1px solid #86EFAC}
.msg.err{background:#FEF2F2;color:#B91C1C;border:1px solid #FECACA}

table{width:100%;border-collapse:collapse;font-size:13px}
th{
  text-align:left;padding:8px 6px;color:#6B7280;font-weight:700;
  border-bottom:2px solid #E5E7EB;font-size:11.5px;
}
td{padding:10px 6px;border-bottom:1px solid #F3F4F6;vertical-align:top}
.co-name{font-weight:700;color:#111827}
.co-key{font-size:11px;color:#9CA3AF;font-family:monospace}

.badge{
  display:inline-block;font-size:10.5px;font-weight:700;padding:2px 8px;
  border-radius:12px;margin:1px 3px 1px 0;
}
.badge.on{background:#DCFCE7;color:#15803D}
.badge.off{background:#F3F4F6;color:#9CA3AF;text-decoration:line-through}
.badge.all{background:#DBEAFE;color:#1D4ED8}

.row-edit-btn{
  background:none;border:1px solid #D1D5DB;border-radius:6px;
  padding:5px 10px;font-size:12px;cursor:pointer;color:#374151;font-family:inherit;
}
.row-edit-btn:hover{border-color:#1A5EA8;color:#1A5EA8}

.edit-panel{
  background:#F9FAFB;border-radius:10px;padding:14px 16px;margin-top:8px;
}
.edit-panel .chk-group{margin-bottom:12px}

.back-link{font-size:12.5px;color:#1A5EA8;text-decoration:none;display:inline-block;margin-bottom:14px}
</style>
</head>
<body>
<div class="wrap">

  <div id="loadingBox">読み込み中…</div>

  <div id="noAccess">
    <div class="icon">🔒</div>
    <div style="font-size:15px;font-weight:700;margin-bottom:6px">この画面は管理者専用です</div>
    <div style="font-size:13px;color:#6B7280">アクセス権限がありません。担当のStrings社員にお問い合わせください。</div>
  </div>

  <div id="mainContent" style="display:none">
    <a class="back-link" href="navi.html">← 比較ナビに戻る</a>
    <header>
      <h1>🏢 取引先管理</h1>
      <div class="sub">工務店（取引先）の登録・対応PPAサービスの設定ができます</div>
    </header>

    <div class="card">
      <div class="card-ttl">＋ 新しい取引先を登録</div>
      <div class="frow">
        <div class="fld">
          <label>工務店名<span style="color:#B91C1C">*</span></label>
          <input type="text" id="newName" placeholder="例：〇〇建設株式会社">
        </div>
        <div class="fld">
          <label>管理用キー（任意）</label>
          <input type="text" id="newKey" placeholder="例：oo-kensetsu">
          <div class="hint">空欄でもOK。英数字とハイフンのみ推奨</div>
        </div>
      </div>
      <div class="frow">
        <div class="fld">
          <label>リース料（円/kW・月額・税別）</label>
          <input type="number" id="newLease" value="2000">
        </div>
        <div class="fld">
          <label>購入kW単価（円・税別）</label>
          <input type="number" id="newBuy" value="300000">
        </div>
      </div>
      <div class="fld" style="margin-bottom:14px">
        <label>対応しているPPAサービス</label>
        <div class="chk-group" id="newPpaChecks"></div>
        <div class="hint">チェックを外したサービスは、この工務店の画面には表示されません。すべてチェックすれば従来通り全部表示されます。</div>
      </div>
      <button class="btn-primary" id="btnAdd" onclick="addCompany()">この内容で登録</button>
      <div class="msg" id="addMsg"></div>
    </div>

    <div class="card">
      <div class="card-ttl">登録済みの取引先一覧</div>
      <table>
        <thead>
          <tr><th>工務店名</th><th>対応PPAサービス</th><th>リース料/kW</th><th>購入単価/kW</th><th></th></tr>
        </thead>
        <tbody id="companyTable"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
var SUPABASE_URL  = 'https://iqgtknxypkqfrhbktxsy.supabase.co';
var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlxZ3Rrbnh5cGtxZnJoYmt0eHN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4MzkxMzIsImV4cCI6MjA5NjQxNTEzMn0.HcLrC9LImbBpVu7nVrfV7ME3VtoRCDOQGR81DaI54LM';
var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

var PPA_SERVICES = [
  { key:'smile',      label:'建て得スマイル' },
  { key:'life',       label:'建て得ライフ' },
  { key:'value',      label:'建て得バリュー' },
  { key:'osakagas',   label:'大阪ガス スマイルーフ' },
  { key:'sharedenki', label:'シェアでんき' }
];
var ALL_PPA_KEYS = PPA_SERVICES.map(function(s){ return s.key; });

var companies = [];

(async function init(){
  var { data: { session } } = await sb.auth.getSession();
  if(!session){
    var base = window.location.href.replace(/\/[^\/]*$/, '/');
    var returnUrl = encodeURIComponent(window.location.href);
    window.location.href = base + 'login?return=' + returnUrl;
    return;
  }

  var { data: userData } = await sb.from('users')
    .select('*, companies(*)')
    .eq('id', session.user.id)
    .single();

  if(!userData || userData.role !== 'superadmin'){
    document.getElementById('loadingBox').style.display = 'none';
    document.getElementById('noAccess').style.display = 'block';
    return;
  }

  document.getElementById('loadingBox').style.display = 'none';
  document.getElementById('mainContent').style.display = 'block';

  renderNewPpaChecks();
  await loadCompanies();
})();

function renderNewPpaChecks(){
  var wrap = document.getElementById('newPpaChecks');
  wrap.innerHTML = PPA_SERVICES.map(function(s){
    return '<label class="chk-item"><input type="checkbox" checked value="'+s.key+'" class="newPpaChk">'+s.label+'</label>';
  }).join('');
}

async function loadCompanies(){
  var { data, error } = await sb.from('companies').select('*').order('name');
  if(error){
    document.getElementById('companyTable').innerHTML =
      '<tr><td colspan="5" style="color:#B91C1C">読み込みに失敗しました: '+error.message+'</td></tr>';
    return;
  }
  companies = data || [];
  renderTable();
}

function ppaBadges(enabledList){
  if(!Array.isArray(enabledList)){
    return '<span class="badge all">全サービス対応</span>';
  }
  if(enabledList.length === 0){
    return '<span class="badge off">PPA非対応</span>';
  }
  return PPA_SERVICES.map(function(s){
    var on = enabledList.includes(s.key);
    return '<span class="badge '+(on?'on':'off')+'">'+s.label+'</span>';
  }).join('');
}

function renderTable(){
  var tbody = document.getElementById('companyTable');
  tbody.innerHTML = companies.map(function(c, idx){
    return ''
      + '<tr>'
      + '  <td><div class="co-name">'+escapeHtml(c.name)+'</div><div class="co-key">'+escapeHtml(c.client_key||'—')+'</div></td>'
      + '  <td>'+ppaBadges(c.enabled_ppa_plans)+'</td>'
      + '  <td>¥'+Number(c.lease_monthly_per_kw||0).toLocaleString()+'</td>'
      + '  <td>¥'+Number(c.buy_price_per_kw||0).toLocaleString()+'</td>'
      + '  <td><button class="row-edit-btn" onclick="toggleEdit('+idx+')">編集</button></td>'
      + '</tr>'
      + '<tr id="editRow'+idx+'" style="display:none"><td colspan="5">'+editPanelHtml(c, idx)+'</td></tr>';
  }).join('');
}

function editPanelHtml(c, idx){
  var enabledList = Array.isArray(c.enabled_ppa_plans) ? c.enabled_ppa_plans : ALL_PPA_KEYS;
  var checks = PPA_SERVICES.map(function(s){
    var checked = enabledList.includes(s.key) ? 'checked' : '';
    return '<label class="chk-item"><input type="checkbox" '+checked+' value="'+s.key+'" class="editPpaChk-'+idx+'">'+s.label+'</label>';
  }).join('');
  return ''
    + '<div class="edit-panel">'
    + '  <div class="fld" style="margin-bottom:12px"><label>対応PPAサービス</label><div class="chk-group">'+checks+'</div></div>'
    + '  <div class="frow">'
    + '    <div class="fld"><label>リース料（円/kW・月額）</label><input type="number" id="editLease'+idx+'" value="'+(c.lease_monthly_per_kw||2000)+'"></div>'
    + '    <div class="fld"><label>購入kW単価（円）</label><input type="number" id="editBuy'+idx+'" value="'+(c.buy_price_per_kw||300000)+'"></div>'
    + '  </div>'
    + '  <button class="btn-primary" onclick="saveCompany('+idx+')">保存する</button>'
    + '  <span class="msg" id="editMsg'+idx+'"></span>'
    + '</div>';
}

function toggleEdit(idx){
  var row = document.getElementById('editRow'+idx);
  row.style.display = row.style.display === 'none' ? '' : 'none';
}

async function saveCompany(idx){
  var c = companies[idx];
  var checked = Array.from(document.querySelectorAll('.editPpaChk-'+idx+':checked')).map(function(el){ return el.value; });
  var allChecked = checked.length === PPA_SERVICES.length;

  var payload = {
    enabled_ppa_plans: allChecked ? null : checked,
    lease_monthly_per_kw: parseInt(document.getElementById('editLease'+idx).value) || 2000,
    buy_price_per_kw: parseInt(document.getElementById('editBuy'+idx).value) || 300000
  };

  var msgEl = document.getElementById('editMsg'+idx);
  var { error } = await sb.from('companies').update(payload).eq('id', c.id);

  if(error){
    msgEl.textContent = '保存失敗: ' + error.message;
    msgEl.className = 'msg err';
    msgEl.style.display = 'inline-block';
    return;
  }
  msgEl.textContent = '✓ 保存しました';
  msgEl.className = 'msg ok';
  msgEl.style.display = 'inline-block';
  await loadCompanies();
}

async function addCompany(){
  var name = document.getElementById('newName').value.trim();
  var key  = document.getElementById('newKey').value.trim();
  var msgEl = document.getElementById('addMsg');
  var btnEl = document.getElementById('btnAdd');

  if(!name){
    msgEl.textContent = '工務店名を入力してください';
    msgEl.className = 'msg err';
    msgEl.style.display = 'block';
    return;
  }

  var checked = Array.from(document.querySelectorAll('.newPpaChk:checked')).map(function(el){ return el.value; });
  var allChecked = checked.length === PPA_SERVICES.length;

  var payload = {
    name: name,
    client_key: key || null,
    lease_monthly_per_kw: parseInt(document.getElementById('newLease').value) || 2000,
    buy_price_per_kw: parseInt(document.getElementById('newBuy').value) || 300000,
    ppa_plan: 'smile',
    enabled_ppa_plans: allChecked ? null : checked
  };

  btnEl.disabled = true;
  var { error } = await sb.from('companies').insert(payload);
  btnEl.disabled = false;

  if(error){
    msgEl.textContent = '登録失敗: ' + error.message;
    msgEl.className = 'msg err';
    msgEl.style.display = 'block';
    return;
  }

  msgEl.textContent = '✓ 「'+name+'」を登録しました';
  msgEl.className = 'msg ok';
  msgEl.style.display = 'block';

  document.getElementById('newName').value = '';
  document.getElementById('newKey').value = '';
  document.getElementById('newLease').value = 2000;
  document.getElementById('newBuy').value = 300000;
  renderNewPpaChecks();

  await loadCompanies();
}

function escapeHtml(s){
  var div = document.createElement('div');
  div.textContent = s == null ? '' : String(s);
  return div.innerHTML;
}
</script>
</body>
</html>
