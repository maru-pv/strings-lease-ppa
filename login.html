<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン | 光熱費まるごと比較ナビ</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans',sans-serif;
  background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0f172a 100%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:20px;padding:40px 36px;width:100%;max-width:400px;
  box-shadow:0 24px 80px rgba(0,0,0,.4)}
.logo{text-align:center;margin-bottom:28px}
.logo-icon{font-size:40px;margin-bottom:8px}
.logo-title{font-size:20px;font-weight:800;color:#1A5EA8}
.logo-sub{font-size:12px;color:#6B7280;margin-top:3px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:700;color:#374151;margin-bottom:6px}
.form-group input{
  width:100%;padding:12px 14px;
  border:1.5px solid #D1D5DB;border-radius:10px;
  font-size:15px;font-family:inherit;
  transition:border-color .15s;
  /* autocomplete対応：ブラウザのパスワード保存を促す */
}
.form-group input:focus{outline:none;border-color:#1A5EA8}
.btn-login{
  width:100%;background:linear-gradient(135deg,#1A5EA8,#2563eb);
  color:#fff;border:none;border-radius:10px;
  padding:14px;font-size:16px;font-weight:800;
  cursor:pointer;font-family:inherit;margin-top:8px;
  transition:opacity .15s}
.btn-login:hover{opacity:.9}
.btn-login:disabled{opacity:.5;cursor:not-allowed}
.err{display:none;background:#FEF2F2;border:1px solid #FECACA;
  border-radius:8px;padding:10px 12px;font-size:13px;color:#B91C1C;margin-top:12px}
.loading{display:none;text-align:center;padding:12px;font-size:13px;color:#6B7280}
.divider{display:flex;align-items:center;gap:10px;margin:20px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#E5E7EB}
.divider span{font-size:11px;color:#9CA3AF;white-space:nowrap}
.note{font-size:11px;color:#9CA3AF;text-align:center;margin-top:20px;line-height:1.7}
.note a{color:#1A5EA8;text-decoration:none}
/* パスワードリセット */
.btn-reset{background:none;border:none;color:#1A5EA8;font-size:12px;
  cursor:pointer;font-family:inherit;padding:0;text-decoration:underline}
.success-box{display:none;background:#F0FDF4;border:1px solid #86EFAC;
  border-radius:10px;padding:16px;text-align:center;font-size:13px;color:#15803D}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">☀️</div>
    <div class="logo-title">光熱費まるごと比較ナビ</div>
    <div class="logo-sub">住宅営業支援ツール for Strings</div>
  </div>

  <!-- ログインフォーム -->
  <div id="loginForm">
    <div class="form-group">
      <label for="email">メールアドレス</label>
      <!-- autocomplete="username" でブラウザのパスワード保存を促す -->
      <input type="email" id="email" name="email"
        autocomplete="username"
        placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label for="password">
        パスワード
        <button class="btn-reset" onclick="showReset()" type="button"
          style="float:right;margin-top:1px">パスワードを忘れた方</button>
      </label>
      <!-- autocomplete="current-password" でブラウザのパスワード保存を促す -->
      <input type="password" id="password" name="password"
        autocomplete="current-password"
        placeholder="••••••••">
    </div>
    <button class="btn-login" id="btnLogin" onclick="doLogin()">
      ログイン
    </button>
    <div class="err" id="errMsg"></div>
    <div class="loading" id="loading">ログイン中...</div>
  </div>

  <!-- パスワードリセットフォーム -->
  <div id="resetForm" style="display:none">
    <div class="form-group">
      <label for="resetEmail">登録メールアドレス</label>
      <input type="email" id="resetEmail" autocomplete="email"
        placeholder="your@email.com">
    </div>
    <button class="btn-login" onclick="doReset()">
      リセットメールを送信
    </button>
    <div class="success-box" id="resetSuccess">
      リセット用メールを送信しました。メールボックスをご確認ください。
    </div>
    <div class="err" id="resetErr"></div>
    <div style="text-align:center;margin-top:16px">
      <button class="btn-reset" onclick="showLogin()">← ログインに戻る</button>
    </div>
  </div>

  <div class="divider"><span>ログイン情報はブラウザに保存されます</span></div>
  <div class="note">
    アカウントをお持ちでない方は<br>
    担当の Strings 社員にお問い合わせください<br>
    <a href="mailto:jimu@pv-strings.co.jp">jimu@pv-strings.co.jp</a>
  </div>
</div>

<script>
/* ============================================================
   Supabase 初期化
============================================================ */
var SUPABASE_URL  = 'https://iqgtknxypkqfrhbktxsy.supabase.co';
var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlxZ3Rrbnh5cGtxZnJoYmt0eHN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4MzkxMzIsImV4cCI6MjA5NjQxNTEzMn0.HcLrC9LImbBpVu7nVrfV7ME3VtoRCDOQGR81DaI54LM';
var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

/* ============================================================
   既にログイン済みならnaviへリダイレクト
============================================================ */
(async function checkSession(){
  var { data: { session } } = await sb.auth.getSession();
  if(session){
    redirectToNavi();
  }
})();

function redirectToNavi(){
  /* returnUrlパラメータがあればそこへ、なければホーム画面へ */
  var params = new URLSearchParams(window.location.search);
  var returnUrl = params.get('return');
  if(returnUrl){
    window.location.href = decodeURIComponent(returnUrl);
  } else {
    var base = window.location.href.replace(/\/[^\/]*$/, '/');
    window.location.href = base;
  }
}

/* ============================================================
   ログイン処理
============================================================ */
async function doLogin(){
  var email    = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;
  var errEl    = document.getElementById('errMsg');
  var loadEl   = document.getElementById('loading');
  var btnEl    = document.getElementById('btnLogin');

  errEl.style.display = 'none';

  if(!email || !password){
    errEl.textContent = 'メールアドレスとパスワードを入力してください';
    errEl.style.display = 'block';
    return;
  }

  btnEl.disabled = true;
  loadEl.style.display = 'block';

  var { data, error } = await sb.auth.signInWithPassword({ email, password });

  loadEl.style.display = 'none';
  btnEl.disabled = false;

  if(error){
    var msg = error.message.includes('Invalid') 
      ? 'メールアドレスまたはパスワードが正しくありません'
      : error.message;
    errEl.textContent = msg;
    errEl.style.display = 'block';
    return;
  }

  /* ログイン成功 → naviへ */
  redirectToNavi();
}

/* Enterキーでもログイン */
document.addEventListener('keydown', function(e){
  if(e.key === 'Enter' && document.getElementById('loginForm').style.display !== 'none'){
    doLogin();
  }
});

/* ============================================================
   パスワードリセット
============================================================ */
function showReset(){
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('resetForm').style.display = 'block';
}
function showLogin(){
  document.getElementById('resetForm').style.display = 'none';
  document.getElementById('loginForm').style.display = 'block';
}

async function doReset(){
  var email  = document.getElementById('resetEmail').value.trim();
  var errEl  = document.getElementById('resetErr');
  var okEl   = document.getElementById('resetSuccess');
  errEl.style.display = 'none';
  okEl.style.display  = 'none';

  if(!email){
    errEl.textContent = 'メールアドレスを入力してください';
    errEl.style.display = 'block';
    return;
  }

  var base = window.location.href.replace(/\/[^\/]*$/, '/');
  var { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: base + 'login'
  });

  if(error){
    errEl.textContent = error.message;
    errEl.style.display = 'block';
  } else {
    okEl.style.display = 'block';
  }
}
</script>
</body>
</html>
