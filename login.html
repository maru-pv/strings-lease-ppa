<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン｜太陽光リースvs建て得 比較シミュレーター</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #F0F4F8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-wrap {
      width: 100%;
      max-width: 400px;
    }
    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .login-logo-icon {
      width: 40px; height: 40px;
      background: #0F2D52;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .login-logo-text {
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: #0F2D52;
      line-height: 1.3;
      text-align: left;
    }
    .login-logo-sub {
      font-size: 11px;
      font-weight: 400;
      color: #6B7280;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
    }
    .login-title {
      font-size: 18px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 6px;
    }
    .login-desc {
      font-size: 12px;
      color: #6B7280;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }
    input[type=email], input[type=password] {
      width: 100%;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      border: 1.5px solid #E5E7EB;
      border-radius: 8px;
      background: #fff;
      color: #111827;
      transition: border-color .15s, box-shadow .15s;
      -webkit-appearance: none;
    }
    input:focus {
      outline: none;
      border-color: #1A5EA8;
      box-shadow: 0 0 0 3px rgba(26,94,168,.10);
    }
    .login-btn {
      width: 100%;
      padding: 12px;
      background: #0F2D52;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 8px;
      transition: background .2s;
      letter-spacing: .02em;
    }
    .login-btn:hover { background: #1A4A7A; }
    .login-btn:disabled { opacity: .6; cursor: not-allowed; }
    .error-msg {
      display: none;
      background: #FEE2E2;
      border: 1px solid #FECACA;
      color: #B91C1C;
      font-size: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      margin-top: 12px;
      line-height: 1.5;
    }
    .loading {
      display: none;
      text-align: center;
      color: #6B7280;
      font-size: 13px;
      margin-top: 12px;
    }
    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 11px;
      color: #9CA3AF;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-header">
      <div class="login-logo">
        <div class="login-logo-icon">☀️</div>
        <div class="login-logo-text">
          太陽光リース vs 建て得<br>
          <span class="login-logo-sub">比較シミュレーター｜Strings</span>
        </div>
      </div>
    </div>

    <div class="login-card">
      <div class="login-title">ログイン</div>
      <div class="login-desc">担当者アカウントでログインしてください。<br>アカウントはStrings社から発行されます。</div>

      <div class="form-group">
        <label for="email">メールアドレス</label>
        <input type="email" id="email" placeholder="example@company.co.jp" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">パスワード</label>
        <input type="password" id="password" placeholder="パスワードを入力" autocomplete="current-password">
      </div>

      <button class="login-btn" id="loginBtn" onclick="doLogin()">ログイン →</button>

      <div class="error-msg" id="errorMsg"></div>
      <div class="loading" id="loading">ログイン中...</div>
    </div>

    <div class="login-footer">
      パスワードを忘れた場合はStrings担当者にお問い合わせください<br>
      © 2026 Strings Inc.
    </div>
  </div>

  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ============================================================
    // Supabase設定
    // ============================================================
    const SUPABASE_URL  = 'https://iqgtknxypkqfrhbktxsy.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlxZ3Rrbnh5cGtxZnJoYmt0eHN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4MzkxMzIsImV4cCI6MjA5NjQxNTEzMn0.HcLrC9LImbBpVu7nVrfV7ME3VtoRCDOQGR81DaI54LM';
    const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    // ============================================================
    // 既にログイン済みならシミュレーターにリダイレクト
    // ============================================================
    (async () => {
      const { data: { session } } = await _sb.auth.getSession();
      if (session) {
        window.location.href = 'index.html';
      }
    })();

    // ============================================================
    // ログイン処理
    // ============================================================
    async function doLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('loginBtn');
      const errEl    = document.getElementById('errorMsg');
      const loadEl   = document.getElementById('loading');

      // バリデーション
      if (!email || !password) {
        showError('メールアドレスとパスワードを入力してください。');
        return;
      }

      // ローディング開始
      btn.disabled = true;
      errEl.style.display = 'none';
      loadEl.style.display = 'block';

      try {
        const { data, error } = await _sb.auth.signInWithPassword({ email, password });

        if (error) {
          showError(getErrorMessage(error.message));
          return;
        }

        // ログイン成功 → agentレコードの確認
        const { data: agent, error: agentErr } = await _sb
          .from('agents')
          .select('*, companies(*)')
          .eq('user_id', data.user.id)
          .eq('active', true)
          .single();

        if (agentErr || !agent) {
          await _sb.auth.signOut();
          showError('アカウントが見つかりません。Strings担当者にお問い合わせください。');
          return;
        }

        // agentデータをsessionStorageに保存
        sessionStorage.setItem('agent', JSON.stringify(agent));

        // シミュレーターにリダイレクト
        window.location.href = 'index.html';

      } catch (e) {
        showError('通信エラーが発生しました。再度お試しください。');
      } finally {
        btn.disabled = false;
        loadEl.style.display = 'none';
      }
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('loading').style.display = 'none';
      document.getElementById('loginBtn').disabled = false;
    }

    function getErrorMessage(msg) {
      if (msg.includes('Invalid login credentials')) return 'メールアドレスまたはパスワードが正しくありません。';
      if (msg.includes('Email not confirmed'))       return 'メールアドレスの確認が完了していません。';
      if (msg.includes('Too many requests'))         return 'ログイン試行が多すぎます。しばらく待ってから再試行してください。';
      return 'ログインに失敗しました。再度お試しください。';
    }

    // Enterキーでログイン
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
