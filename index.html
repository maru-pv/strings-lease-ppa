<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光熱費まるごと比較ナビ | ホーム</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans',sans-serif;
  background:#F3F4F6;color:#1F2937;line-height:1.6;
  min-height:100vh;
}
.wrap{max-width:640px;margin:0 auto;padding:48px 20px 60px}

#loadingBox{text-align:center;padding:80px 20px;color:#9CA3AF;font-size:13px}

header{margin-bottom:28px;text-align:center}
h1{font-size:22px;color:#1A5EA8;font-weight:800;margin-bottom:6px}
.sub{font-size:13px;color:#6B7280}
.userTag{
  display:inline-block;margin-top:12px;font-size:12px;
  background:#EFF6FF;color:#1A5EA8;padding:5px 14px;border-radius:20px;font-weight:700;
}

#menuList{display:none}

.menu-card{
  display:block;background:#fff;border-radius:14px;padding:20px 22px;
  margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.06);
  text-decoration:none;color:inherit;
  border:1.5px solid transparent;
  transition:border-color .15s ease, transform .15s ease;
}
.menu-card:hover{border-color:#1A5EA8;transform:translateY(-1px)}
.menu-card .icon{font-size:24px;margin-bottom:8px}
.menu-card .ttl{font-size:15.5px;font-weight:800;color:#111827;margin-bottom:4px}
.menu-card .desc{font-size:12.5px;color:#6B7280}

.menu-card.admin{border-color:#FDE68A;background:#FFFBEB}
.menu-card.admin .ttl{color:#92400E}

.section-label{
  font-size:11px;font-weight:800;color:#9CA3AF;letter-spacing:.05em;
  margin:22px 0 10px;text-transform:uppercase;
}
.section-label:first-of-type{margin-top:0}

.logout-link{
  display:block;text-align:center;margin-top:30px;font-size:12.5px;
  color:#9CA3AF;text-decoration:none;
}
.logout-link:hover{color:#6B7280}
</style>
</head>
<body>
<div class="wrap">

  <div id="loadingBox">読み込み中…</div>

  <div id="menuList">
    <header>
      <h1>☀️ 光熱費まるごと比較ナビ</h1>
      <div class="sub">使いたいツールを選んでください</div>
      <div class="userTag" id="userTag"></div>
    </header>

    <div class="section-label">お客様への商談で使う</div>

    <a class="menu-card" href="navi">
      <div class="icon">📊</div>
      <div class="ttl">光熱費まるごと比較ナビ</div>
      <div class="desc">電気ガス併用・オール電化・太陽光の比較、詳細シミュレーション依頼まで</div>
    </a>

    <a class="menu-card" href="solar-sim">
      <div class="icon">🔆</div>
      <div class="ttl">太陽光の仕組み体感ツール</div>
      <div class="desc">太陽光がどう電気をつくるかを、動きのある図で説明できます</div>
    </a>

    <div class="section-label">社内・打ち合わせ準備用</div>

    <a class="menu-card" href="pattern-lab">
      <div class="icon">🧪</div>
      <div class="ttl">提案パターン・ラボ</div>
      <div class="desc">お客様のタイプ別に、話し方・見せ方の型を整理できます</div>
    </a>

    <div id="adminSection" style="display:none">
      <div class="section-label">管理者用</div>
      <a class="menu-card admin" href="admin">
        <div class="icon">🏢</div>
        <div class="ttl">取引先管理</div>
        <div class="desc">工務店の登録、対応サービス・単価の設定</div>
      </a>
    </div>

    <a class="logout-link" href="#" onclick="doLogout(); return false;">ログアウト</a>
  </div>
</div>

<script>
var SUPABASE_URL  = 'https://iqgtknxypkqfrhbktxsy.supabase.co';
var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlxZ3Rrbnh5cGtxZnJoYmt0eHN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4MzkxMzIsImV4cCI6MjA5NjQxNTEzMn0.HcLrC9LImbBpVu7nVrfV7ME3VtoRCDOQGR81DaI54LM';
var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

(async function init(){
  var { data: { session } } = await sb.auth.getSession();
  if(!session){
    window.location.href = 'login';
    return;
  }

  var { data: userData } = await sb.from('users')
    .select('*, companies(*)')
    .eq('id', session.user.id)
    .single();

  document.getElementById('loadingBox').style.display = 'none';
  document.getElementById('menuList').style.display = 'block';

  if(userData){
    var companyName = userData.companies ? userData.companies.name : '';
    document.getElementById('userTag').textContent =
      (userData.name || session.user.email) + (companyName ? '（' + companyName + '）' : '');

    if(userData.role === 'superadmin'){
      document.getElementById('adminSection').style.display = 'block';
    }
  } else {
    document.getElementById('userTag').textContent = session.user.email;
  }
})();

async function doLogout(){
  await sb.auth.signOut();
  window.location.href = 'login';
}
</script>
</body>
</html>
